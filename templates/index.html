<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantVeda Mk3 — Intelligent Reforestation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v='1.0') }}">
</head>
<body>
    <div id="loader" class="loader-wrapper" style="display:none;">
        <div class="loader"></div>
        <p>Analyzing Environment & Running PSO Swarm...</p>
    </div>

    <main>
        <header>
            <a href="#" class="upper">E-Library</a>
            <a href="#" class="upper">About Project</a>
        </header>

        <section>
            <div class="container">
                <div class="glass-card">
                    <h1>PlantVeda <span class="version">Mk3</span></h1>
                    <p class="subtitle">AI-Driven Plant Recommendation System</p>

                    <form method="POST" action="/" target="_blank" onsubmit="showSuccess()">
                        <div class="form-group">
                            <label>Target Location</label>
                            <input type="text" name="place" placeholder="e.g. Kolkata, WB" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Area (m²)</label>
                                <input type="number" name="area" placeholder="e.g. 500" step="0.1" required>
                            </div>
                            <div class="form-group">
                                <label>Budget (₹)</label>
                                <input type="number" name="budget" placeholder="e.g. 10000" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Soil Type</label>
                                <select name="soil" required>
                                    <option value="" disabled selected>Select Soil</option>
                                    <option value="Loamy">Loamy</option>
                                    <option value="Sandy">Sandy</option>
                                    <option value="Clayey">Clayey</option>
                                    <option value="Moist Loam">Moist Loam</option>
                                    <option value="Wet soil">Wet soil</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Habitat</label>
                                <select name="habitat" required>
                                    <option value="" disabled selected>Select Habitat</option>
                                    <option value="Garden">Garden</option>
                                    <option value="Pathside">Pathside</option>
                                    <option value="Open field">Open field</option>
                                    <option value="Pond">Pond</option>
                                    <option value="Flower bed">Flower bed</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn">Generate Report</button>
                    </form>
                    <div class="result">
                        <div class="success-box" id="successMsg" style="display:none;">
                            <h3>✅ Report Generated!</h3>
                            <p>Your PDF has opened in a new tab.</p>
                        </div>
                        {% if error %}
                            <div class="error-box"><p>⚠️ {{ error }}</p></div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function showLoader() {
            document.getElementById('loader').style.display = 'flex';
        }
        function showSuccess() {
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }, 3000); // shows after 3 seconds
        }
        </script>
    </body>
</html>
